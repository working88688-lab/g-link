      operationId: ''
      description: '统一 OAuth 入口, 支持 Google / GitHub / Apple. 客户端必须根据场景选其一:

        移动原生 SDK (Google Sign-In / Apple Sign In) 拿到 id_token 传 id_token 字段;

        OAuth 授权码流 (Web / GitHub 等) 传 code 字段.


        同一 (provider, openid) 第一次登录会自动注册新账号; 后续用同样 OAuth 就直接登录.


        成功返回结构和 `/auth/login/sms` 完全一致 (user + tokens + is_new_user).'
