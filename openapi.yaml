                    type: object
                    properties:
                      kicked_count:
                        type: integer
                        example: 2
                  timestamp:
                    type: integer
                    example: 1745027200
                  request_id:
                    type: string
                    example: req_logout_others_001
      tags:
      - 账户
  /api/v1/auth/deactivate:
    post:
      summary: 注销账号 (进入 7 天冷却期)
      operationId: '7'
      description: "用户主动申请注销. 执行后:\n - 账号状态置为 3 (注销中)\n - 所有设备 token 立即失效, 下次请求都 -10021\n\
        \ - 7 天后定时任务 hard-delete 用户数据 (软删 + 冷存归档)\n - 7 天内如果用户重新登录 (产品决策, 本版未开启),\
        \ 可取消注销"
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 0
                  message: success
                  data:
                    deactivate_at: '2026-04-18T10:30:00+00:00'
                    scheduled_at: '2026-04-25T10:30:00+00:00'
                    cooldown_days: 7
                  timestamp: 1776500000
                  request_id: req_abcdef0123456789
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      deactivate_at:
                        type: string
                        example: '2026-04-18T10:30:00+00:00'
                        description: 注销申请时间 (ISO 8601)
                      scheduled_at:
                        type: string
                        example: '2026-04-25T10:30:00+00:00'
                        description: 预计数据删除时间 (ISO 8601), 即申请时间 + 7 天
                      cooldown_days:
                        type: integer
                        example: 7
                        description: 冷却期天数, 固定 7
                  timestamp:
                    type: integer
                    example: 1776500000
                  request_id:
                    type: string
                    example: req_abcdef0123456789
      tags:
      - 账户
  /api/v1/auth/deactivate/cancel:
    post:
      summary: 取消注销申请
      operationId: ''
      description: '注销申请提交后 7 天冷却期内可取消. 账号重新恢复正常使用, 冷却期内已失效的

        Token 不会自动恢复 — 用户需重新登录.'
