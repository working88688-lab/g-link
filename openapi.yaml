                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      cancelled:
                        type: boolean
                        example: true
                        description: 固定 true, 表示取消成功
                  timestamp:
                    type: integer
                    example: 1776500000
                  request_id:
                    type: string
                    example: req_abcdef0123456789
      tags:
      - 账户
