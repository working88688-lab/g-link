  /api/v1/auth/push-token:
    put:
      summary: 更新推送 Token
      operationId: Token
      description: 'App 启动 / 用户授权推送 / 推送 token 轮换时都应该调一次. 按当前登录设备 (JWT

        里解析出的 device_id) 对 gl_user_devices.push_token + push_platform 覆盖写入.

        同设备同账号多次调用只会更新最新值.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 0
                  message: success
                  data:
                    updated: true
                  timestamp: 1776500000
                  request_id: req_abcdef0123456789
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      updated:
                        type: boolean
                        example: true
                  timestamp:
                    type: integer
                    example: 1776500000
                  request_id:
                    type: string
                    example: req_abcdef0123456789
      tags:
      - 通知
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                push_token:
                  type: string
                  description: APNs (iOS) / FCM (Android) / 厂商通道的推送 token. 设备每次启动拿到新
                    token 都要上报一次. Must not be greater than 500 characters.
                  example: fcm_token_AAAA_BBBB_CCCC_xxxx
                push_platform:
                  type: string
                  description: '推送通道: apns / fcm / huawei / xiaomi / oppo. 和 push_token
                    配套.'
                  example: fcm
                  enum:
                  - apns
                  - fcm
                  - huawei
                  - xiaomi
                  - oppo
              required:
              - push_token
              - push_platform
