      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 0
                  message: success
                  data:
                    user:
                      uid: 5200
                      username: user_abcd1234
                      nickname: 张三
                      avatar_url: https://lh3.googleusercontent.com/a/default-user
                      phone: null
                      email: zhangsan@gmail.com
                      is_verified: false
                      created_at: '2026-04-18T10:22:00+00:00'
                    tokens:
                      access_token: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJzdWIiOiI1MjAwIiwi...
                      refresh_token: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJzdWIiOiI1MjAwIiwi...
                      access_expires_in: 7200
                      refresh_expires_in: 2592000
                      token_type: Bearer
                    is_new_user: true
                    require_onboarding: true
                  timestamp: 1776500000
                  request_id: req_abcdef0123456789
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          uid:
                            type: integer
                            example: 5200
                            description: 用户 UID (need_bindphone 时无此字段)
                          username:
                            type: string
                            example: user_abcd1234
                            description: 用户名
                          nickname:
                            type: string
                            example: 张三
                            description: 昵称
                          avatar_url:
                            type: string
                            example: https://lh3.googleusercontent.com/a/default-user
                            description: 头像 URL, 未设置时为 null
                          phone:
                            type: string
                            example: null
                            description: 手机号 (脱敏格式), 未绑定为 null
                          email:
                            type: string
                            example: zhangsan@gmail.com
                            description: 邮箱, 未绑定为 null
                          is_verified:
                            type: boolean
                            example: false
                            description: 是否已实名认证
                          created_at:
                            type: string
                            example: '2026-04-18T10:22:00+00:00'
                            description: 注册时间 (ISO 8601)
                      tokens:
                        type: object
                        properties:
                          access_token:
                            type: string
                            example: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJzdWIiOiI1MjAwIiwi...
                            description: 访问令牌, 有效期 2 小时
                          refresh_token:
                            type: string
                            example: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.eyJzdWIiOiI1MjAwIiwi...
                            description: 刷新令牌, 有效期 30 天
                          access_expires_in:
                            type: integer
                            example: 7200
                            description: 访问令牌有效期 (秒)
                          refresh_expires_in:
                            type: integer
                            example: 2592000
                            description: 刷新令牌有效期 (秒)
                          token_type:
