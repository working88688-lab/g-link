                            example: https://wx.qlogo.cn/mmopen/vi_32/example.jpg
                            description: 头像 URL, 未设置时为 null
                          phone:
                            type: string
                            example: +155****7890
                            description: 手机号 (脱敏格式)
                          email:
                            type: string
                            example: null
                            description: 邮箱, 未绑定为 null
                          is_verified:
                            type: boolean
                            example: false
                            description: 是否已实名认证
                          created_at:
                            type: string
                            example: '2026-04-18T10:05:00+08:00'
                            description: 注册时间 (ISO 8601)
                      tokens:
                        type: object
                        properties:
                          access_token:
                            type: string
                            example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                            description: 访问令牌, 有效期 2 小时
                          refresh_token:
                            type: string
                            example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                            description: 刷新令牌, 有效期 30 天
                          token_type:
                            type: string
                            example: Bearer
                            description: 令牌类型, 固定 Bearer
                          access_expires_in:
                            type: integer
                            example: 7200
                            description: 访问令牌有效期 (秒)
                          refresh_expires_in:
                            type: integer
                            example: 2592000
                            description: 刷新令牌有效期 (秒)
                      is_new_user:
                        type: boolean
                        example: true
                        description: 是否新注册用户
                      require_onboarding:
                        type: boolean
                        example: true
                  timestamp:
                    type: integer
                    example: 1745027200
                  request_id:
                    type: string
                    example: req_bindphone_001
      tags:
      - 账户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bind_token:
                  type: string
                  description: 临时绑定令牌 (由 /auth/login/oauth 的 need_bindphone 分支返回,
                    15分钟有效). Must not be greater than 128 characters.
                  example: abc123...
                country_code:
                  type: string
                  description: 国际区号 (纯数字, 如 86). Must match the regex /^\d{1,4}$/.
                  example: '86'
                phone:
                  type: string
                  description: 本地手机号 (不含区号和 +). Must match the regex /^\d{4,15}$/.
                  example: '13800138000'
                code:
                  type: string
                  description: 验证码 (6位数字, 由 /auth/code/send channel=sms type=bind
                    发出).
                  example: '123456'
                device_id:
                  type: string
                  description: 设备唯一ID. Must not be greater than 128 characters.
                  example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                device_type:
                  type: string
                  description: '设备类型: ios / android / web / h5.'
                  example: ios
                  enum:
                  - ios
                  - android
                  - web
                  - h5
                device_name:
                  type: string
                  description: 设备名称. Must not be greater than 100 characters.
                  example: iPhone 15 Pro
                  nullable: true
                device_model:
                  type: string
                  description: 设备型号. Must not be greater than 100 characters.
                  example: iPhone16,1
                  nullable: true
                os_version:
                  type: string
                  description: 系统版本. Must not be greater than 30 characters.
                  example: '17.4'
                  nullable: true
                app_version:
                  type: string
                  description: App 版本号. Must not be greater than 20 characters.
                  example: 1.0.0
                  nullable: true
                push_token:
                  type: string
                  description: 推送 Token (APNs/FCM). Must not be greater than 500 characters.
                  example: null
                  nullable: true
                push_platform:
                  type: string
                  description: '推送平台: apns=苹果 / fcm=谷歌 / huawei=华为 / xiaomi=小米 / oppo=OPPO;
                    与 push_token 配套.'
                  example: apns
                  enum:
                  - apns
                  - fcm
                  - huawei
                  - xiaomi
                  - oppo
                  nullable: true
              required:
              - bind_token
              - country_code
              - phone
              - code
              - device_id
              - device_type
      security: []
  /api/v1/auth/refresh:
    post:
      summary: Token 刷新
      operationId: token
      description: '用 refresh_token 换取新的 (access_token, refresh_token) 对. 每次 refresh
        后旧的

        refresh_token 立即失效; 若旧 refresh 再次被使用 (盗号场景), 整账号此设备所有 token

        会被强制吊销, 前端需提示用户重新登录.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 0
                  message: success
                  data:
                    tokens:
                      access_token: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.new_access_token...
                      refresh_token: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.new_refresh_token...
                      access_expires_in: 7200
                      refresh_expires_in: 2592000
                      token_type: Bearer
                  timestamp: 1776500000
                  request_id: req_abcdef0123456789
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      tokens:
                        type: object
                        properties:
                          access_token:
                            type: string
                            example: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.new_access_token...
                            description: 新的访问令牌, 有效期 2 小时
                          refresh_token:
                            type: string
                            example: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9.new_refresh_token...
                            description: 新的刷新令牌, 有效期 30 天 (旧 refresh 同时失效)
                          access_expires_in:
                            type: integer
                            example: 7200
                            description: 访问令牌有效期 (秒)
                          refresh_expires_in:
                            type: integer
                            example: 2592000
                            description: 刷新令牌有效期 (秒)
                          token_type:
                            type: string
                            example: Bearer
                            description: 令牌类型, 固定 Bearer
                  timestamp:
                    type: integer
                    example: 1776500000
                  request_id:
                    type: string
                    example: req_abcdef0123456789
      tags:
      - 账户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: '登录时返回的 refresh_token. Access Token 过期后用这个换新的 access
                    + refresh pair. **注意**: 旧 refresh 换新之后立刻失效, 若旧 refresh 再次被用 →
                    服务端判定盗用, 整账号此设备的所有 token 被撤销, 需重新登录.'
                  example: eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9...
              required:
              - refresh_token
      security: []
  /api/v1/auth/logout:
    post:
      summary: 退出登录
      operationId: ''
      description: '需要登录. 从当前 access_token 里解析出 (uid, device_id), 撤销该设备的 access +
        refresh,

        gl_user_devices.status 更新为 1 (已退出), push_token 清空 (不再推送).

        同账号的其他设备不受影响, 还是在线.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 0
                  message: Logged out
                  data: null
                  timestamp: 1776500000
                  request_id: req_abcdef0123456789
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: Logged out
                  data:
                    type: string
                    example: null
                    description: null 退出成功时 data 为 null
                  timestamp:
                    type: integer
                    example: 1776500000
                  request_id:
                    type: string
                    example: req_abcdef0123456789
      tags:
      - 账户
  /api/v1/auth/oauth/bind:
    post:
      summary: 绑定第三方登录 (追加到当前账号)
      operationId: ''
      description: '需登录. 给当前账号绑定新的 OAuth 通道, 绑完后同一个账号可以用多种方式登录.

        同 provider 重复绑定会覆盖之前的 openid. 同 openid 已被其他账号绑定会 -10732.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 0
                  message: success
                  data:
                    provider: wechat
                    openid: oBvFj4xxxxxxxxxxxxxxxxxxxxxxxxxxxx
                    nickname: 微信昵称
                    bound_at: '2026-04-18T10:25:00+00:00'
                  timestamp: 1776500000
                  request_id: req_abcdef0123456789
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      provider:
                        type: string
                        example: wechat
                      openid:
                        type: string
                        example: oBvFj4xxxxxxxxxxxxxxxxxxxxxxxxxxxx
                        description: 该平台下的用户唯一标识
                      nickname:
                        type: string
                        example: 微信昵称
                      bound_at:
                        type: string
                        example: '2026-04-18T10:25:00+00:00'
                        description: 绑定时间 (ISO 8601)
                  timestamp:
                    type: integer
                    example: 1776500000
                  request_id:
                    type: string
                    example: req_abcdef0123456789
      tags:
      - 账户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  description: '要绑定的第三方平台: google / github / apple.'
                  example: google
                  enum:
                  - google
                  - github
                  - apple
                id_token:
                  type: string
                  description: (可选) 原生 SDK id_token, 和 code 二选一. This field is required
                    when <code>code</code> is not present. Must not be greater than
                    8192 characters.
                  example: null
                  nullable: true
                code:
                  type: string
                  description: (可选) OAuth 授权码, 和 id_token 二选一. This field is required
                    when <code>id_token</code> is not present. Must not be greater
                    than 2048 characters.
                  example: 061xxxx
                  nullable: true
              required:
              - provider
