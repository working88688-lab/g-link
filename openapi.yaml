  /api/v1/auth/code/send:
    post:
      summary: 发送验证码
      operationId: ''
      description: '支持手机短信 (channel=sms) 和邮箱 (channel=email) 两种渠道, 适用于注册 / 登录 /

        重置密码 / 绑定手机四种场景. 多级限流: 同一账号 60 秒内只能请求一次, 单账号每日最多

        10 条, 同 IP 每日最多 20 条. 验证码 6 位数字, 5 分钟有效.


        captcha_token 字段已预留但暂未启用, 传任意值或不传均不影响结果.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 0
                  message: success
                  data:
                    sent: true
                    expires_in: 300
                    retry_after: 60
                  timestamp: 1713076200
                  request_id: req_a1b2c3d4
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      sent:
                        type: boolean
                        example: true
                      expires_in:
                        type: integer
                        example: 300
                      retry_after:
                        type: integer
                        example: 60
                  timestamp:
                    type: integer
                    example: 1713076200
                  request_id:
                    type: string
                    example: req_a1b2c3d4
      tags:
      - 账户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channel:
                  type: string
                  description: '发送渠道: sms=手机短信 / email=邮箱.'
                  example: sms
                  enum:
                  - sms
                  - email
                country_code:
                  type: string
                  description: 国际区号 (纯数字, 如 86/1/852); channel=sms 时必填. This field
                    is required when <code>channel</code> is <code>sms</code>. Must
                    match the regex /^\d{1,4}$/.
                  example: '86'
                  nullable: true
                phone:
                  type: string
                  description: 本地手机号 (不含区号和 +); channel=sms 时必填. This field is required
                    when <code>channel</code> is <code>sms</code>. Must match the
                    regex /^\d{4,15}$/.
                  example: '13800138000'
                  nullable: true
                email:
                  type: string
                  description: 邮箱地址; channel=email 时必填. This field is required when
                    <code>channel</code> is <code>email</code>. Must be a valid email
                    address. Must not be greater than 255 characters.
                  example: user@example.com
                  nullable: true
                type:
                  type: string
                  description: '验证码场景: login=登录 / register=注册 / reset_password=重置密码
                    / bind=绑定手机.'
                  example: register
                  enum:
                  - login
                  - register
                  - reset_password
                  - bind
                captcha_token:
                  type: string
                  description: 图形验证码 Token (暂未启用, 传任意值或不传均可; 后续接入 hCaptcha/极验后生效).
                    Must not be greater than 255 characters.
                  example: null
                  nullable: true
              required:
              - channel
              - type
      security: []
  /api/v1/auth/register:
    post:
      summary: 注册账号
      operationId: ''
      description: '支持手机号和邮箱两种注册方式, 需先调用 /auth/code/send 获取验证码.

        注册即登录, 成功后直接返回 JWT 双 Token. 首次注册返回 is_new_user=true, 客户端展示引导页.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 0
                  message: success
                  data:
                    action: login
                    user:
                      uid: 5010
                      username: user_ab3k9xzw
                      nickname: user_ab3k9xzw
                      avatar_url: null
                      phone: 1-555****890
                      email: null
                      is_verified: false
                      created_at: '2026-04-18T10:00:00+08:00'
                    tokens:
                      access_token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                      refresh_token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                      token_type: Bearer
                      access_expires_in: 7200
                      refresh_expires_in: 2592000
                    is_new_user: true
                    require_onboarding: true
                    websocket:
                      url: wss://ws.glink.com/
                      heartbeat_interval: 30
                      reconnect_max_retry: 5
                      reconnect_base_delay: 1000
                    unread:
                      notification: 0
                      message: 0
                  timestamp: 1745027200
                  request_id: req_register_001
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      action:
                        type: string
                        example: login
                        description: 操作类型, 固定 login
                      user:
                        type: object
                        properties:
                          uid:
                            type: integer
                            example: 5010
                            description: 用户 UID
                          username:
                            type: string
                            example: user_ab3k9xzw
                            description: 用户名 (系统自动生成)
                          nickname:
                            type: string
                            example: user_ab3k9xzw
                            description: 昵称
                          avatar_url:
                            type: string
                            example: null
                            description: 头像 URL, 未设置时为 null
                          phone:
                            type: string
                            example: 1-555****890
                            description: 手机号 (脱敏格式), 未绑定为 null
                          email:
                            type: string
                            example: null
                            description: 邮箱, 未绑定为 null
                          is_verified:
                            type: boolean
                            example: false
                            description: 是否已实名认证
                          created_at:
                            type: string
                            example: '2026-04-18T10:00:00+08:00'
                            description: 注册时间 (ISO 8601)
                      tokens:
                        type: object
                        properties:
                          access_token:
                            type: string
                            example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                            description: 访问令牌, 有效期 2 小时
                          refresh_token:
                            type: string
