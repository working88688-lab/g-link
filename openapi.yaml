openapi: 3.0.3
info:
  title: Glink API
  description: "# 接入须知\n\nGlink 社区 App 后端 REST API 对接文档，覆盖 7 大业务模块共 116 个 HTTP 接口\
    \ + 18 个 WebSocket 命令。\n\n**文档 UI 入口**：\n- `http://api.glink.cc/docs` — Stoplight\
    \ Elements 渲染，左侧大纲按业务分组\n- `http://api.glink.cc/docs/websocket.html` — **WebSocket\
    \ 协议专页**（帧格式 / 命令清单 / 消息类型 / 错误码）\n\n**OpenAPI 规范源文件**：\n- `http://api.glink.cc/docs/openapi.yaml`\
    \ — 标准 OpenAPI 3.0.3，可导入 Postman / YApi / Apifox / 生成前端 SDK\n\n**Base URL**:\n\
    - 开发环境: `http://api.glink.cc`（本地 `/etc/hosts` 指向 127.0.0.1）\n- 生产环境: `https://api.glink.com`\n\
    \n---\n\n## 1. 统一响应信封\n\n**所有接口** 返回同一外层结构（不管成功还是失败）：\n\n```json\n{\n  \"code\"\
    : 0,\n  \"message\": \"success\",\n  \"data\": { ... },\n  \"timestamp\": 1713076200,\n\
    \  \"request_id\": \"req_a1b2c3d4e5f6\"\n}\n```\n\n| 字段 | 类型 | 说明 |\n|---|---|---|\n\
    | `code` | int | **0 = 成功, 非 0 = 业务错误**（全部是负数） |\n| `message` | string | 调试用提示，**前端不展示给终端用户**（要展示用自己的\
    \ i18n 文案） |\n| `data` | object \\| array \\| null | 成功时的业务数据；失败时为 `null` 或错误上下文\
    \ |\n| `timestamp` | int | 服务器 Unix 时间戳（秒） |\n| `request_id` | string | 请求唯一 ID，排查问题时带上\
    \ |\n\n### HTTP 状态码规则\n\n**所有接口 HTTP 状态码统一 200**，不使用 401/403/404/422/429/500。前端只需要看\
    \ `response.data.code`：\n\n```js\n// 推荐的前端拦截器写法\nif (response.data.code === 0)\
    \ {\n  return response.data.data;   // 成功, 返回业务数据\n}\nif (response.data.code ===\
    \ -10010) {\n  router.push('/login');       // Token 失效, 跳登录\n  return;\n}\ntoast.error(response.data.message);\
    \  // 其它错误, 显示提示\nthrow new BizError(response.data.code, response.data.message);\n\
    ```\n\n---\n\n## 2. 错误码体系\n\n错误码按 `code < 0` 的**段位**编排，一看就知道哪个模块：\n\n| 段位 | 归属\
    \ |\n|---|---|\n| `-10001 ~ -10099` | 公共 — 认证 / Token / 账号状态 |\n| `-10101 ~ -10199`\
    \ | 公共 — 参数校验 |\n| `-10201 ~ -10299` | 模块 1 — 首页帖子 |\n| `-10301 ~ -10399` | 模块\
    \ 2 — 搜索 |\n| `-10401 ~ -10499` | 模块 3 — 短视频 + 模块 4 — 发布 |\n| `-10501 ~ -10599`\
    \ | 模块 5 — 消息 |\n| `-10601 ~ -10699` | 模块 6 — 个人主页设置 |\n| `-10701 ~ -10799` |\
    \ 模块 7 — 账户与通知 |\n| `-10801 ~ -10899` | 公共 — 通用业务错误（资源不存在 / 无权限 / 重复操作 / 限流） |\n\
    | `-50001 ~ -50099` | 服务器内部错误（请联系后端） |\n\n### 前端必须特殊处理的 code\n\n| code | 含义 |\
    \ 前端行为 |\n|---|---|---|\n| `-10010` | Token 过期 | 清本地 token, 跳登录页 |\n| `-10020`\
    \ | 账号封禁 | 弹窗 \"账号已被封禁\"，跳登录页 |\n| `-10021` | 账号注销 | 弹窗 \"账号已注销\"，跳登录页 |\n| `-10040`\
    \ | 已在其他设备登录 | 弹窗 \"已在其它设备登录\"，跳登录页 |\n\n其它错误码见对应接口的响应示例。\n\n---\n\n## 3. 鉴权\n\
    \n**JWT 双 Token**（RS256 非对称加密）：\n\n- **Access Token** - 有效期 2 小时，每次 API 请求用：\n\
    \  ```\n  Authorization: Bearer {access_token}\n  ```\n- **Refresh Token** - 有效期\
    \ 30 天，Access 过期后换新对：\n  ```http\n  POST /api/v1/auth/refresh\n  Content-Type:\
    \ application/json\n  \n  {\"refresh_token\": \"xxx\"}\n  ```\n  返回新 Access +\
    \ 新 Refresh（旧 Refresh 立即失效，**再用旧的会整账号踢下线**，防盗）\n\n### 多设备管理\n\n- 同账号最多 5 设备同时在线\n\
    - 超 5 台时**最早登录的被踢**，踢下线用户会收到 WebSocket 推送 `system.kick`\n- `POST /api/v1/auth/devices/{device_id}`\
    \ 可主动踢指定设备\n\n### 不需要登录的接口\n\n接口卡片上有 `\U0001F513 unauthenticated` 标签的就是免登录（登录\
    \ / 注册 / 发验证码 等）。\n\n---\n\n## 4. 分页\n\n### 游标分页（90% 场景：Feed / 帖子列表 / 消息 / 评论\
    \ …）\n\n```\nGET /api/v1/feed/follow?cursor=1713069000000&limit=20\n```\n\n响应：\n\
    ```json\n{\n  \"code\": 0,\n  \"data\": {\n    \"lists\": [ { ... }, { ... } ],\n\
    \    \"next_cursor\": \"1713068000000\",\n    \"has_more\": true\n  }\n}\n```\n\
    \n- `cursor` 首次请求不传 = 从最新开始；之后传上页返回的 `next_cursor`\n- `limit` 默认 20，范围 1-50\n\
    - `has_more` = false 表示没有更多\n\n### 偏移分页（少数场景：搜索结果 / 后台管理）\n\n```\nGET /api/v1/search?q=bali&page=1&page_size=20\n\
    ```\n\n响应：\n```json\n{\n  \"code\": 0,\n  \"data\": {\n    \"lists\": [...],\n\
    \    \"pagination\": {\n      \"page\": 1,\n      \"page_size\": 20,\n      \"\
    total\": 1580,\n      \"total_pages\": 79\n    }\n  }\n}\n```\n\n---\n\n## 5.\
    \ 限流\n\n服务端分层限流，超限统一返回 `code: -10804` 或接口专属错误码。\n\n| 层 | 规则 |\n|---|---|\n| 全局\
    \ API | 100 req/s/IP, burst 200 |\n| 登录 / 注册 / 验证码类 | 10 req/s/IP, burst 20 |\n\
    | 短信发送 | 单号 60s 间隔, 每日 10 条; 单 IP 每日 20 条 |\n| 发帖 / 发视频 | 单号 5 篇/分钟, 50 篇/天 |\n\
    | 单接口细粒度 | 详见接口文档 |\n\n---\n\n## 6. 必带请求头\n\n所有请求（除不需要登录的）推荐都带上：\n\n```http\n\
    Content-Type: application/json\nAccept: application/json\nAuthorization: Bearer\
    \ {access_token}          # 需登录接口\nX-Device-Id: {客户端生成的设备唯一 ID}         # 多设备管理必需\n\
    X-App-Version: 1.2.3                          # 灰度 / 问题排查\nX-Platform: ios | android\
    \ | web               # 平台差异化\n```\n\n---\n\n## 7. Request ID 追踪\n\n- 每个响应的 `request_id`\
    \ 在**服务端全链路日志里可追查**\n- 客户端报 bug 时**带上这个 ID**，后端可以 5 秒内定位\n- 客户端自己想追踪时也可以在 header\
    \ 里主动传 `X-Request-Id: xxx`，服务端会透传\n\n---\n\n## 8. WebSocket（实时消息）\n\n独立子域，与 HTTP\
    \ API 完全分离：\n\n| 环境 | 地址 |\n|---|---|\n| 开发 | `ws://ws.glink.cc/` |\n| 生产 | `wss://ws.glink.com/`\
    \ |\n\n连接时携带 Access Token：\n\n```\nws://ws.glink.cc/?token={access_token}\n```\n\
    \nToken 无效时服务端推送 `error` 事件后以 code **4001** 断开。独立渲染页：[websocket.html](http://api.glink.cc/docs/websocket.html)\n\
    \n---\n\n### 8.1 帧格式\n\n所有帧均为 **JSON 文本帧**（非二进制）。\n\n**上行帧（客户端 → 服务端）**\n\n```json\n\
    { \"cmd\": \"命令名\", \"seq\": \"可选唯一标识\", \"data\": { ...命令参数 } }\n```\n\n**下行帧（服务端\
    \ → 客户端）**\n\n```json\n{ \"event\": \"事件名\", \"data\": { ...事件数据 } }\n```\n\n\
    `seq` 由客户端自定义（UUID 或时间戳字符串），ACK 类事件原样返回，用于匹配请求与响应。\n\n---\n\n### 8.2 消息类型（msg_type）\n\
    \n| 值 | 说明 | content | media_url |\n|---|---|---|---|\n| `1` | 纯文字 | ✅ 必填 | —\
    \ |\n| `2` | 图片 | — | ✅ 必填 |\n| `3` | 语音 | — | ✅ 必填 |\n| `4` | 视频 | — | ✅ 必填 |\n\
    | `5` | 位置 | 可选（地点名） | — （坐标在 media_meta） |\n| `6` | 链接卡片 | 可选（标题） | ✅ 必填（链接 URL）\
    \ |\n| `7` | 系统通知（服务端发，客户端只读） | ✅ 必填 | — |\n\n消息状态（`status`）：`0`=正常 / `1`=已撤回\
    \ / `2`=已删除\n\n---\n\n### 8.3 在线状态与离线消息\n\n- 连接成功后服务端写 `online:{uid}`，TTL 300\
    \ 秒；客户端每 **60 秒**发一次应用层 `heartbeat` 续约\n- 同一账号可多端同时在线，消息向所有在线端推送\n- 断线期间的消息写入离线队列，最多\
    \ **200 条 / 7 天**；重连后自动按时间升序 flush（逐条推 `msg.push`）\n\n> **注意**：WebSocket 协议层的\
    \ ping/pong（RFC 6455）由 Swoole 和客户端 SDK 自动处理，不需要手动实现。\n> 应用层 `heartbeat` 命令的唯一作用是给\
    \ Redis 在线状态 key 续约——60 秒间隔是 TTL（300s）的 1/5，给了足够的重试窗口。\n\n---\n\n### 8.4 客户端发送命令\n\
    \n#### heartbeat — 心跳续约\n\n```json\n{ \"cmd\": \"heartbeat\", \"seq\": \"hb_001\"\
    \ }\n```\n\n服务端推送 `heartbeat_ack`：\n\n```json\n{ \"event\": \"heartbeat_ack\"\
    , \"data\": { \"seq\": \"hb_001\", \"server_time\": 1745100000 } }\n```\n\n---\n\
    \n#### msg.send — 发送消息\n\n支持 6 种消息类型。携带 `client_msg_id` 时 10 分钟内自动幂等去重。\n\n```json\n\
    {\n  \"cmd\": \"msg.send\",\n  \"seq\": \"s_001\",\n  \"data\": {\n    \"chat_id\"\
    : 100,\n    \"msg_type\": 1,\n    \"content\": \"你好\",\n    \"media_url\": null,\n\
    \    \"media_meta\": null,\n    \"reply_msg_id\": null,\n    \"client_msg_id\"\
    : \"uuid-xxxx\"\n  }\n}\n```\n\n响应（发送方）`msg.send_ack`：\n\n```json\n{ \"event\"\
    : \"msg.send_ack\", \"data\": { \"seq\": \"s_001\", \"msg_id\": 9001, \"client_msg_id\"\
    : \"uuid-xxxx\", \"server_time\": 1745100001 } }\n```\n\n推送（其他成员）`msg.push`：\n\
    \n```json\n{\n  \"event\": \"msg.push\",\n  \"data\": { \"msg_id\": 9001, \"chat_id\"\
    : 100, \"sender_uid\": 1001, \"msg_type\": 1, \"content\": \"你好\", \"media_url\"\
    : null, \"media_meta\": null, \"reply_msg_id\": null, \"status\": 0, \"created_at\"\
    : \"2026-04-20T10:00:01+08:00\" }\n}\n```\n\n---\n\n#### msg.read — 已读上报\n\n```json\n\
    { \"cmd\": \"msg.read\", \"seq\": \"r_001\", \"data\": { \"chat_id\": 100, \"\
    last_read_msg_id\": 9001 } }\n```\n\n通知发送方 `msg.read_notify`：\n\n```json\n{ \"\
    event\": \"msg.read_notify\", \"data\": { \"chat_id\": 100, \"last_read_msg_id\"\
    : 9001, \"reader_uid\": 1002 } }\n```\n\n---\n\n#### msg.recall — 撤回消息\n\n仅限 **2\
    \ 分钟内**，超时返回 `err_code: -10510`，非发送者返回 `-10511`。\n\n```json\n{ \"cmd\": \"msg.recall\"\
    , \"seq\": \"rc_001\", \"data\": { \"chat_id\": 100, \"msg_id\": 9001 } }\n```\n\
    \n广播所有成员 `msg.recall_notify`：\n\n```json\n{ \"event\": \"msg.recall_notify\",\
    \ \"data\": { \"chat_id\": 100, \"msg_id\": 9001, \"recalled_by\": 1001 } }\n\
    ```\n\n---\n\n#### msg.typing — 正在输入\n\n服务端 5 秒去重，fire-and-forget（无 ACK）。\n\n\
    ```json\n{ \"cmd\": \"msg.typing\", \"data\": { \"chat_id\": 100 } }\n```\n\n\
    对端收到 `msg.typing_notify`：\n\n```json\n{ \"event\": \"msg.typing_notify\", \"data\"\
    : { \"chat_id\": 100, \"uid\": 1001 } }\n```\n\n---\n\n#### chat.mute_toggle /\
    \ chat.pin_toggle — 免打扰 / 置顶\n\n```json\n{ \"cmd\": \"chat.mute_toggle\", \"seq\"\
    : \"m_001\", \"data\": { \"chat_id\": 100 } }\n{ \"cmd\": \"chat.pin_toggle\"\
    ,  \"seq\": \"p_001\", \"data\": { \"chat_id\": 100 } }\n```\n\n响应（仅发送方）`chat.update`：\n\
    \n```json\n{ \"event\": \"chat.update\", \"data\": { \"chat_id\": 100, \"is_muted\"\
    : true, \"seq\": \"m_001\" } }\n{ \"event\": \"chat.update\", \"data\": { \"chat_id\"\
    : 100, \"is_pinned\": false, \"seq\": \"p_001\" } }\n```\n\n---\n\n### 8.5 服务端推送事件\n\
    \n| 事件 | 触发场景 |\n|---|---|\n| `connected` | 握手成功，随后自动 flush 离线消息 |\n| `msg.push`\
    \ | 收到新消息（含离线 flush） |\n| `msg.send_ack` | 自己发送的消息落库成功 |\n| `msg.read_notify`\
    \ | 对方已读 |\n| `msg.recall_notify` | 会话内某条消息被撤回 |\n| `msg.typing_notify` | 对端正在输入\
    \ |\n| `chat.update` | 会话免打扰 / 置顶状态变更 |\n| `heartbeat_ack` | 心跳回包 |\n| `system.kick`\
    \ | 被踢下线（设备数超限），随后断开 |\n| `error` | 命令处理失败或鉴权失败 |\n\n---\n\n### 8.6 错误处理\n\n`error`\
    \ 事件结构：\n\n```json\n{ \"event\": \"error\", \"data\": { \"code\": \"business_error\"\
    , \"message\": \"...\", \"err_code\": -10510, \"seq\": \"rc_001\" } }\n```\n\n\
    | code | 是否断开 |\n|---|---|\n| `token_required` / `token_invalid` | ✅ 断开 (4001)\
    \ |\n| `not_authenticated` / `invalid_frame` / `unknown_cmd` / `validation_failed`\
    \ / `access_denied` / `business_error` / `server_error` | 否 |\n\n业务 `err_code`：`-10510`\
    \ 撤回超时 / `-10511` 非发送者 / `-10512` 消息不存在 / `-10503` 非会话成员 / `-10501` 被对方拉黑\n\n\
    ---\n\n**对接流程建议**：\n1. 读完本章\"公共约定\"\n2. 按下方模块导航逐个看业务接口\n3. 不明白点 \"Try It Out\"\
    \ 直接调\n4. 报问题带上 `request_id`\n"
  version: 1.0.0
servers:
- url: https://api.zywsbgha.cc
tags:
- name: 个人主页
  description: ''
- name: 其他
  description: ''
- name: 发布
  description: ''
- name: 搜索
  description: ''
- name: 消息
  description: ''
- name: 短视频
  description: ''
- name: 设置
  description: ''
- name: 账户
  description: ''
- name: 通知
  description: ''
- name: 首页帖子
  description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: Access Token 由 `POST /api/v1/auth/sms/login` 或 `POST /api/v1/auth/password/login`
        接口返回. 过期后用 Refresh Token 调 `POST /api/v1/auth/refresh` 换新.
security:
- default: []
paths:
  /api/v1/posts/{postId}/favorite:
    post:
      summary: 收藏帖子
      operationId: ''
      description: 幂等操作, 已收藏再次调用返回成功不报错.
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 0
                  message: success
                  data:
                    post_id: 100001
                    is_favorited: true
                    favorite_count: 891
                  timestamp: 1745027200
                  request_id: req_fav_001
                properties:
                  code:
                    type: integer
                    example: 0
                    description: 状态码, 0=成功
                  message:
                    type: string
                    example: success
                    description: 状态描述
                  data:
                    type: object
                    properties:
                      post_id:
                        type: integer
                        example: 100001
                        description: 帖子 ID
                      is_favorited:
                        type: boolean
                        example: true
                        description: 是否已收藏, 幂等调用始终为 true
                      favorite_count:
                        type: integer
                        example: 891
                  timestamp:
                    type: integer
                    example: 1745027200
                    description: Unix 时间戳 (秒)
                  request_id:
                    type: string
                    example: req_fav_001
                    description: 请求追踪 ID
      tags:
      - 个人主页
    delete:
      summary: 取消收藏帖子
      operationId: ''
      description: 目标未收藏时返回 FAVORITE_NOT_FOUND 错误.
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 0
                  message: success
                  data:
                    post_id: 100001
                    is_favorited: false
                  timestamp: 1745027200
                  request_id: req_fav_002
                properties:
                  code:
                    type: integer
                    example: 0
                    description: 状态码, 0=成功
                  message:
                    type: string
                    example: success
                    description: 状态描述
                  data:
                    type: object
                    properties:
                      post_id:
                        type: integer
                        example: 100001
                        description: 帖子 ID
                      is_favorited:
                        type: boolean
                        example: false
                        description: 是否已收藏, 取消后始终为 false
                  timestamp:
                    type: integer
                    example: 1745027200
                    description: Unix 时间戳 (秒)
                  request_id:
                    type: string
                    example: req_fav_002
                    description: 请求追踪 ID
      tags:
      - 个人主页
    parameters:
    - in: path
      name: postId
      description: 帖子 ID.
      example: 100001
      required: true
      schema:
        type: integer
  /api/v1/videos/{videoId}/favorite:
    post:
      summary: 收藏视频
      operationId: ''
      description: 幂等操作, 已收藏再次调用返回成功. 03 视频模块合并前不校验视频是否存在.
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  code: 0
                  message: success
                  data:
                    post_id: 100001
                    is_favorited: true
                    favorite_count: 891
                  timestamp: 1745027200
                  request_id: req_fav_001
                properties:
                  code:
                    type: integer
                    example: 0
                    description: 状态码, 0=成功
                  message:
                    type: string
                    example: success
                    description: 状态描述
                  data:
                    type: object
                    properties:
                      post_id:
                        type: integer
                        example: 100001
                        description: 视频 ID (字段名沿用 post_id, 与帖子收藏保持统一)
                      is_favorited:
                        type: boolean
                        example: true
                        description: 是否已收藏, 幂等调用始终为 true
                      favorite_count:
                        type: integer
                        example: 891
                  timestamp:
                    type: integer
                    example: 1745027200
                    description: Unix 时间戳 (秒)
                  request_id:
                    type: string
                    example: req_fav_001
                    description: 请求追踪 ID
      tags:
      - 个人主页
    delete:
      summary: 取消收藏视频
      operationId: ''
      description: 目标未收藏时返回 FAVORITE_NOT_FOUND 错误.
      parameters: []
