name: g_link
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  flutter_inappwebview:
    path: plugins/flutter_inappwebview
  get_thumbnail_video:
    path: plugins/video_thumbnail
  utils:
    path: plugins/utils
  analytics_sdk:
    path: plugins/analytics_sdk
  image_picker:
    path: plugins/image_picker
  event_bus: ^2.0.0
  cupertino_icons: ^1.0.8
  dio: ^5.4.3+1
  go_router: 12.1.3
  logger: ^2.0.2+1
  easy_localization: ^3.0.7
  bot_toast: ^4.1.3
  provider: ^6.1.1
  encrypt: ^5.0.3
  crypto: ^3.0.3
  url_launcher: ^6.2.4
  universal_html: ^2.2.4
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  web_socket_channel: ^2.4.0
  flutter_screenutil: ^5.9.3
  flutter_swiper_null_safety_flutter3: ^4.0.3
  cross_file: ^0.3.5+2
  characters: ^1.4.0
  http_parser: ^4.1.2
  package_info_plus: ^8.0.2
  html_unescape: ^2.0.0
  common_utils: ^2.1.0
  shelf: ^1.2.0
  pedantic: ^1.0.0
  app_installer: ^1.1.0
  safe_area_insets: ^0.1.3
  shelf_static: ^1.1.3
  android_id: ^0.3.6
  visibility_detector: ^0.3.3
  image_gallery_saver_plus: ^4.0.1
  image: ^4.3.0
  device_info_plus: ^9.1.1
  pull_to_refresh: ^2.0.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0
  camera: ^0.12.0+1
  photo_manager: ^3.9.0
  video_player: ^2.11.1
  extended_text_field: ^16.0.2
  screen_brightness: ^2.1.7
  volume_controller: ^3.4.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_gradient.png"

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  go_router_builder: ^2.4.0
  analyzer: ^6.4.1
  flutter_native_splash: ^2.4.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/

flutter_native_splash:
  color: "#ffffff"

  image: assets/images/splash.png

  android: true
  ios: true

  android_gravity: center
  ios_content_mode: center

  fullscreen: true

  android_12:
    image: assets/images/splash.png
    icon_background_color: "#ffffff"