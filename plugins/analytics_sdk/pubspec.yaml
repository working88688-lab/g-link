name: analytics_sdk
description: "A new Flutter project."
version: 1.3.0
homepage:

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  synchronized: 3.1.0
  device_info_plus: ^9.1.1
  path_provider: ^2.0.15
  pointycastle: 3.7.3
  crypto: ^3.0.2
  http: ^1.2.0
  archive: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  plugin:
    platforms:
      android:
        package: com.example.analytics_sdk
        pluginClass: AnalyticsSdkPlugin
      ios:
        pluginClass: AnalyticsSdkPlugin
      linux:
        pluginClass: AnalyticsSdkPlugin
      macos:
        pluginClass: AnalyticsSdkPlugin
      windows:
        pluginClass: AnalyticsSdkPluginCApi
      web:
        pluginClass: AnalyticsSdkWeb
        fileName: analytics_sdk_web.dart
